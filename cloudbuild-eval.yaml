# ⚠️  Cloud Build DEPLOY is intentionally DISABLED.
#
# The real production deploy config was moved to `cloudbuild-eval.gcp.yaml`
# (preserved untouched for a future return to Google Cloud). This file is a
# harmless no-op so that a lingering Cloud Build trigger which references
# "cloudbuild-eval.yaml" CANNOT deploy to the retired GCP project on merge.
#
# The evaluator now deploys to Fly.io — see `fly.eval.toml` and
# `.github/workflows/deploy.yml`.
#
# ► To fully stop the trigger from firing at all: in GitHub, remove the
#   "Google Cloud Build" GitHub App's access to this repository (repo/org
#   Settings → GitHub Apps → Google Cloud Build → Configure → remove this
#   repo).
#
# ► To RE-ENABLE GCP deploys later: rename `cloudbuild-eval.gcp.yaml` back to
#   `cloudbuild-eval.yaml`.
steps:
  - name: 'gcr.io/cloud-builders/gcloud'
    entrypoint: 'bash'
    args:
      - '-c'
      - 'echo "cloudbuild-eval.yaml is disabled in-repo — the evaluator now deploys via Fly.io. See cloudbuild-eval.gcp.yaml."'
options:
  logging: CLOUD_LOGGING_ONLY
