# ⚠️  Cloud Build DEPLOY is intentionally DISABLED.
#
# The real production deploy config was moved to `cloudbuild.gcp.yaml`
# (preserved untouched for a future return to Google Cloud). This file is a
# harmless no-op so that a lingering Cloud Build trigger which references
# "cloudbuild.yaml" CANNOT deploy to the retired GCP project on merge.
#
# GSR now deploys to Fly.io — see `fly.toml` and
# `.github/workflows/deploy.yml`.
#
# ► To fully stop the trigger from firing at all (recommended, and fully in
#   your control): in GitHub, remove the "Google Cloud Build" GitHub App's
#   access to this repository (repo/org Settings → GitHub Apps → Google Cloud
#   Build → Configure → remove this repo). That severs the webhook so no build
#   runs, regardless of this file.
#
# ► To RE-ENABLE GCP deploys later: rename `cloudbuild.gcp.yaml` back to
#   `cloudbuild.yaml`.
steps:
  - name: 'gcr.io/cloud-builders/gcloud'
    entrypoint: 'bash'
    args:
      - '-c'
      - 'echo "cloudbuild.yaml is disabled in-repo — GSR now deploys via Fly.io. See cloudbuild.gcp.yaml."'
options:
  logging: CLOUD_LOGGING_ONLY
