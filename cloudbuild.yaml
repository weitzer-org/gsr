steps:
  # Build the container image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'us-central1-docker.pkg.dev/quacktastic-waffle/gsr-code-review/adk:$COMMIT_SHA'
      - '-t'
      - 'us-central1-docker.pkg.dev/quacktastic-waffle/gsr-code-review/adk:latest'
      - '-f'
      - 'adk/Dockerfile'
      - 'adk/'

  # Push the container image to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'us-central1-docker.pkg.dev/quacktastic-waffle/gsr-code-review/adk'
      - '--all-tags'

  # Deploy container image to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'gsr-code-review'
      - '--image'
      - 'us-central1-docker.pkg.dev/quacktastic-waffle/gsr-code-review/adk:$COMMIT_SHA'
      - '--region'
      - 'us-central1'
      - '--allow-unauthenticated'
      - '--set-secrets'
      - 'GEMINI_API_KEY=gsr-gemini-api-key:latest'

images:
  - 'us-central1-docker.pkg.dev/quacktastic-waffle/gsr-code-review/adk:$COMMIT_SHA'
  - 'us-central1-docker.pkg.dev/quacktastic-waffle/gsr-code-review/adk:latest'
