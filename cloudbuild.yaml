# cloudbuild.yaml
# CI/CD pipeline to build, test, push, and deploy the ADK monolith to Cloud Run.

substitutions:
  _REGION: 'us-central1'
  _ARTIFACT_REGISTRY_REPO_NAME: 'gsr-code-review'
  _CLOUD_RUN_SERVICE_NAME: 'gsr-code-review'
  _SECRET_NAME: 'gsr-gemini-api-key'
  _IMAGE_TAG: $COMMIT_SHA

options:
  logging: CLOUD_LOGGING_ONLY

steps:
# =============================================================================
# STAGE 1: Build Container Images
# =============================================================================
- name: 'gcr.io/cloud-builders/docker'
  id: 'build-adk'
  args: [
    'build',
    '-f', 'adk/Dockerfile',
    '-t', '$_REGION-docker.pkg.dev/$PROJECT_ID/$_ARTIFACT_REGISTRY_REPO_NAME/adk:$_IMAGE_TAG',
    '-t', '$_REGION-docker.pkg.dev/$PROJECT_ID/$_ARTIFACT_REGISTRY_REPO_NAME/adk:latest',
    '.'
  ]

# =============================================================================
# STAGE 2: Run Tests (In Parallel)
# =============================================================================
- name: 'node:20-slim'
  id: 'test-backend'
  entrypoint: 'bash'
  args:
  - '-c'
  - |
    set -e
    cd adk/backend
    npm ci --silent
    npm test
    echo "✅ Backend tests passed"
  waitFor: ['-']

- name: 'node:20-slim'
  id: 'test-frontend'
  entrypoint: 'bash'
  args:
  - '-c'
  - |
    set -e
    cd adk/frontend
    npm ci --silent
    npm test
    echo "✅ Frontend tests passed"
  waitFor: ['-']

# =============================================================================
# STAGE 3: Push Container Images
# =============================================================================
- name: 'gcr.io/cloud-builders/docker'
  id: 'push-adk'
  args: [
    'push',
    '$_REGION-docker.pkg.dev/$PROJECT_ID/$_ARTIFACT_REGISTRY_REPO_NAME/adk',
    '--all-tags'
  ]
  waitFor: ['build-adk', 'test-backend', 'test-frontend']

# =============================================================================
# STAGE 4: Deploy Application
# =============================================================================
- name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
  id: 'deploy-adk'
  entrypoint: 'bash'
  args:
  - '-c'
  - |
    gcloud run deploy $_CLOUD_RUN_SERVICE_NAME \
      --image=$_REGION-docker.pkg.dev/$PROJECT_ID/$_ARTIFACT_REGISTRY_REPO_NAME/adk:$_IMAGE_TAG \
      --region=$_REGION \
      --allow-unauthenticated \
      --set-env-vars="USE_CONTEXT_CACHING=true,USE_VERTEX_AI=true" \
      --set-secrets="GEMINI_API_KEY=$_SECRET_NAME:latest"
    
    echo "✅ Application deployed successfully"
  waitFor: ['push-adk']

# =============================================================================
# STAGE 5: Health Check
# =============================================================================
- name: 'gcr.io/google.com/cloudsdktool/cloud-sdk:alpine'
  id: 'health-check'
  entrypoint: 'sh'
  args:
  - '-c'
  - |
    APP_URL=$(gcloud run services describe $_CLOUD_RUN_SERVICE_NAME \
      --platform managed \
      --region $_REGION \
      --format='value(status.url)' 2>&1)

    if [ -z "$$APP_URL" ]; then
      echo "WARNING: Could not retrieve Cloud Run Application URL"
      exit 1
    fi

    echo "Application health check at $$APP_URL/api/status"
    curl --fail --retry 10 --retry-delay 5 "$$APP_URL/api/status"

    echo "✅ Application health check completed"
  waitFor: ['deploy-adk']

images:
  - '$_REGION-docker.pkg.dev/$PROJECT_ID/$_ARTIFACT_REGISTRY_REPO_NAME/adk:$_IMAGE_TAG'
  - '$_REGION-docker.pkg.dev/$PROJECT_ID/$_ARTIFACT_REGISTRY_REPO_NAME/adk:latest'
