services:
  app:
    build:
      context: .
      dockerfile: adk/Dockerfile
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      PORT: "8080"
      # Defaults to the local MinIO service. Set S3_ENDPOINT in your root
      # .env (e.g. your Cloudflare R2 endpoint) to point local dev at real
      # object storage instead.
      S3_ENDPOINT: "${S3_ENDPOINT:-http://minio:9000}"
      S3_BUCKET: "${S3_BUCKET:-gsr-eval-results-local}"
      S3_REVIEW_BUCKET: "${S3_REVIEW_BUCKET:-gsr-review-results-local}"
    depends_on:
      createbuckets:
        condition: service_completed_successfully
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web console
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY_ID:-minioadmin}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_ACCESS_KEY:-minioadmin}
    volumes:
      - minio-data:/data

  # One-shot: wait for MinIO, then create the app's buckets.
  createbuckets:
    image: minio/mc:latest
    depends_on:
      - minio
    environment:
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-minioadmin}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-minioadmin}
      S3_BUCKET: ${S3_BUCKET:-gsr-eval-results-local}
      S3_REVIEW_BUCKET: ${S3_REVIEW_BUCKET:-gsr-review-results-local}
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 $${S3_ACCESS_KEY_ID} $${S3_SECRET_ACCESS_KEY}; do
        echo 'waiting for minio...'; sleep 2;
      done;
      mc mb --ignore-existing local/$${S3_BUCKET};
      mc mb --ignore-existing local/$${S3_REVIEW_BUCKET};
      echo 'Buckets ready: '$${S3_BUCKET}' '$${S3_REVIEW_BUCKET};
      exit 0;
      "

volumes:
  minio-data:
