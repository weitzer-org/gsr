review_settings:
  min_severity: "Low"
  max_concurrency: 3

subagents:
  - name: "Logic"
    enabled: true
    paths: ["**/*"]
    # We route everything to the logic agent by default as it matches the original pr-code-review behavior

  - name: "Security"
    enabled: true
    paths: ["**/*"]
    # We route everything to the security agent as well, though we could restrict this to specific file types

  - name: "Secrets"
    enabled: true
    paths: ["**/*", ".env*"]

  - name: "Dependencies"
    enabled: true
    paths: ["**/package.json", "**/pom.xml", "**/requirements.txt", "**/go.mod"]

  - name: "Performance"
    enabled: true
    paths: ["**/*.js", "**/*.ts", "**/*.py", "**/*.go", "**/*.java", "**/*.cpp"]

  - name: "Testing"
    enabled: true
    paths: ["**/*.test.*", "**/*.spec.*", "**/tests/**", "**/test/**"]

  - name: "Architecture"
    enabled: true
    paths: ["**/*.js", "**/*.ts", "**/*.py", "**/*.go", "**/*.java", "**/*.cpp"]

  - name: "CICD"
    enabled: true
    paths: [".github/workflows/**", ".gitlab-ci.yml", "Dockerfile*", "docker-compose*"]

  - name: "TechDebt"
    enabled: true
    paths: ["**/*"]

  - name: "PromptSecurity"
    enabled: true
    paths: ["**/*"]
